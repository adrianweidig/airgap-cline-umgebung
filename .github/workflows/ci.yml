name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test environments
        shell: pwsh
        run: ./scripts/Test-AllEnvironmentPackages.ps1
      - name: Build packages
        shell: pwsh
        run: ./scripts/Build-AllEnvironmentPackages.ps1 -Version "0.1.0-ci" -SkipTests